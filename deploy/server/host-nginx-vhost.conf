# 宿主机已有 nginx 的站点 vhost（放进宿主 nginx，例如 /etc/nginx/conf.d/another-me.conf）
#
# 适用场景：这台机器已有一个 nginx 在 :80 对外，EdgeOne 回源指向它。
# 本项目的 compose `gateway` 只监听 127.0.0.1:8080（见 .env：GATEWAY_BIND/GATEWAY_PORT），
# 由这个 vhost 反代进去，从而与其它站点共存、互不串台。
#
# 数据流：
#   浏览器 ──HTTPS──▶ EdgeOne ──HTTP 回源(:80)──▶ 宿主 nginx(本 vhost)
#                    ──▶ 127.0.0.1:8080 (compose gateway) ──▶ frontend / backend
#
# 关键：本 vhost 是 SSE 链路的又一跳，/api 必须再次关闭缓冲，否则观战流不逐条推送。

server {
    listen 80;
    listen [::]:80;

    # 改成你的站点域名（EdgeOne 回源时携带的 Host）。
    # 若希望它仅服务该域名、不影响其它站点，务必精确填写，不要用默认 server。
    server_name your-domain.com;

    # API（含 SSE）：透传到 gateway，关闭缓冲/缓存，长超时
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
    }

    # 前端及其它一切
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
