# Another Me — 自托管服务器网关（docker compose 的 `gateway` 服务）
#
# 目标：把前端(frontend:4173) + 后端(backend:8000) 合并到单个 HTTP 端口(80)，
# 让腾讯云 EdgeOne 以 *HTTP 回源* 指向本机 80。TLS 在 EdgeOne 边缘终结，
# 源站只跑 HTTP，无需在服务器上配证书。
#
# 关键点：
#   - /api/ 反代到 backend，含 SSE 观战流，必须关闭代理缓冲，否则消息不逐条推送。
#   - / 反代到前端 vite preview（自带 SPA 路由回退）。
#   - 前端构建时 VITE_API_BASE_URL 为空 => 浏览器走同源 /api，免 CORS、免 mixed-content。

user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 16m;

    # 上游：docker compose 服务名（同处 appnet 网络）
    upstream am_backend  { server backend:8000; }
    upstream am_frontend { server frontend:4173; }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # 后端健康检查（EdgeOne / 负载探针可用）
        location = /health {
            proxy_pass http://am_backend/health;
        }

        # API 反代（含 SSE：/api/conversations|trips|scenarios/{id}/stream）
        location /api/ {
            proxy_pass http://am_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # EdgeOne 边缘终结了 TLS，回源是 HTTP，但对外是 HTTPS
            proxy_set_header X-Forwarded-Proto https;

            # SSE：关闭缓冲/缓存，长超时，禁用连接复用导致的聚合
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_set_header Connection "";
        }

        # 前端 SPA：交给 vite preview（react-router 回退由 preview 处理）
        location / {
            proxy_pass http://am_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
