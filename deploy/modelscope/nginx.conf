# Another Me — ModelScope 创空间 nginx 配置
# 对外仅监听 7860：/ 托管前端静态（SPA fallback），/api 反代到 backend:8000。
# SSE（观战流）需关闭代理缓冲，否则消息不会逐条推送。
user www-data;
worker_processes 1;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 16m;

    server {
        listen 7860;
        listen [::]:7860;
        server_name _;

        root /app/frontend-dist;
        index index.html;

        # 后端健康检查（创空间可用作存活探针）
        location = /health {
            proxy_pass http://127.0.0.1:8000/health;
        }

        # API 反代（含 SSE：/api/conversations/{id}/stream）
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE：关闭缓冲/缓存，长超时，禁用分块编码缓冲
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_set_header Connection "";
        }

        # 前端 SPA（react-router）：未命中静态资源时回退到 index.html
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
