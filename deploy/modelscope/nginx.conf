# Another Me — ModelScope 创空间 nginx 配置
# 对外仅监听 7860：/ 托管前端静态（SPA fallback），/api 反代到 backend:8000。
# SSE（观战流）需关闭代理缓冲，否则消息不会逐条推送。
#
# 鉴权头桥接（解决创空间网关剥离 Authorization 的问题，零源码改动）：
#   1) sub_filter 向 index.html 注入一段脚本，把前端 fetch 的 Authorization
#      头同时复制到自定义头 X-Auth-Token（自定义头不被平台网关拦截）。
#   2) /api 转发时把 X-Auth-Token 还原成 Authorization 再交给后端。
#   （SSE 用 ?token= 查询参数，本就不依赖该头，无需处理。）
user www-data;
worker_processes 1;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 16m;

    # 有 X-Auth-Token 时用它还原 Bearer；否则透传原始 Authorization（本机直连场景）。
    map $http_x_auth_token $fwd_auth {
        default $http_authorization;
        "~.+"   "Bearer $http_x_auth_token";
    }

    server {
        listen 7860;
        listen [::]:7860;
        server_name _;

        root /app/frontend-dist;
        index index.html;

        # 后端健康检查（创空间可用作存活探针）
        location = /health {
            proxy_pass http://127.0.0.1:8000/health;
        }

        # API 反代（含 SSE：/api/conversations/{id}/stream）
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 还原鉴权头：X-Auth-Token → Authorization: Bearer <token>
            proxy_set_header Authorization $fwd_auth;

            # SSE：关闭缓冲/缓存，长超时，禁用分块编码缓冲
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_set_header Connection "";
        }

        # 前端 SPA（react-router）：未命中静态资源时回退到 index.html。
        # 仅对 HTML 注入鉴权头桥接脚本（JS/CSS 等静态资源不受影响）。
        location / {
            try_files $uri $uri/ /index.html;
            sub_filter_once on;
            sub_filter_types text/html;
            sub_filter "</head>" "<script>(function(){var f=window.fetch;if(!f)return;window.fetch=function(i,o){o=o||{};try{var h=new Headers((o&&o.headers)||(i&&i.headers)||{});var a=h.get('Authorization');if(a){var t=a.indexOf('Bearer ')===0?a.slice(7):a;h.set('X-Auth-Token',t);o.headers=h;}}catch(e){}return f.call(this,i,o);};})();</script></head>";
        }
    }
}
