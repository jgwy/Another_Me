[project]
name = "another-me-backend"
version = "0.1.0"
description = "Another Me — backend API (FastAPI + async SQLAlchemy 2.0 + Postgres)"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi==0.136.3",
    "uvicorn[standard]==0.49.0",
    # [asyncio] extra is required: it pulls in greenlet, which SQLAlchemy's async
    # engine needs (greenlet is NOT auto-installed on Python 3.13). Version stays 2.0.50.
    "sqlalchemy[asyncio]==2.0.50",
    "alembic==1.18.4",
    "pydantic==2.13.4",
    "pydantic-settings==2.14.1",
    "asyncpg==0.31.0",
    "openai==2.41.0",
    "anthropic==0.106.0",
    "sse-starlette==3.4.4",
    "httpx==0.28.1",
    "PyJWT==2.13.0",
    "pwdlib[argon2]==0.3.0",
    "python-multipart>=0.0.32",
]

[dependency-groups]
dev = [
    "ruff==0.15.16",
]

[tool.uv]
package = false

[tool.ruff]
line-length = 120
target-version = "py313"
# Alembic env + autogenerated migrations are framework boilerplate; don't lint them.
extend-exclude = ["alembic"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
# Seed content is long-form Chinese prose; line length is not meaningful there.
"app/seeds/data.py" = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["app"]
