<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; color: #111827; background: #f7f8ff; font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
      main { width: min(1400px, 100%); margin: 0 auto; padding: 24px 24px 40px; }
      .head { display: flex; align-items: flex-end; justify-content: space-between; gap: 18px; margin-bottom: 22px; }
      h1, h2 { margin: 0; letter-spacing: 0; }
      h1 { font-size: 28px; font-weight: 800; }
      h2 { margin-bottom: 14px; font-size: 20px; font-weight: 800; }
      p { margin: 6px 0 0; color: #64748b; font-size: 14px; }
      .section-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-top: 4px; }
      .section-title { margin-bottom: 14px; }
      .section-title h2 { margin-bottom: 4px; }
      .section-title p { margin: 0; color: #94a3b8; font-size: 11px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; }
      .featured { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; margin-bottom: 34px; }
      .card { position: relative; display: grid; grid-template-columns: 62px minmax(0,1fr) auto; gap: 16px; min-height: 126px; padding: 22px; color: inherit; background: #fff; border: 1px solid #e8ecff; border-radius: 14px; text-decoration: none; transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
      .card:hover { transform: translateY(-3px); border-color: #c7d2fe; box-shadow: 0 18px 36px rgba(17,24,39,.10); }
      img { width: 54px; height: 54px; object-fit: cover; border-radius: 10px; background: #eef2ff; }
      .title { display: flex; align-items: center; gap: 8px; min-width: 0; }
      .title strong { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 17px; }
      .badge { border-radius: 999px; padding: 2px 7px; color: #6d5dfc; background: #eef2ff; font-size: 11px; font-weight: 700; white-space: nowrap; }
      .desc { display: -webkit-box; margin: 7px 0 10px; overflow: hidden; color: #64748b; font-size: 13px; line-height: 1.5; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
      .meta { display: flex; gap: 12px; color: #94a3b8; font-size: 12px; }
      .hover { position: absolute; left: 92px; right: 18px; bottom: 14px; transform: translateY(8px); opacity: 0; pointer-events: none; transition: opacity .18s ease, transform .18s ease; }
      .card:hover .hover { opacity: 1; transform: translateY(0); }
      .hover-inner { border: 1px solid #d9defa; border-radius: 12px; padding: 10px; background: rgba(255,255,255,.98); box-shadow: 0 14px 30px rgba(17,24,39,.12); font-size: 12px; line-height: 1.45; }
      video { width: 100%; max-height: 160px; object-fit: cover; border-radius: 10px; background: #000; }
      .empty { padding: 36px; color: #64748b; background: #fff; border: 1px dashed #c7d2fe; border-radius: 14px; text-align: center; }
      @media (max-width: 900px) { .featured { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <div class="head"><div><h1>Agent 广场</h1><p>浏览别人发布的 Agent，点击卡片进入对话。</p></div></div>
      <h2>热门精选</h2>
      <section id="featured" class="featured"></section>
      <div class="section-head"><div class="section-title"><h2>我的 Agent</h2></div></div>
      <section id="mine" class="featured"></section>
      <div class="section-head"><div class="section-title"><h2>ALL AGENT</h2></div></div>
      <section id="allAgents" class="featured"></section>
    </main>
    <script>
      const featured = document.querySelector('#featured');
      const mine = document.querySelector('#mine');
      const allAgents = document.querySelector('#allAgents');
      const avatar = (i) => `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80"><rect width="80" height="80" fill="%23f3f6ff"/><path d="M12 20 L68 8 L54 68 Z" fill="%23ff8a3d"/><path d="M22 42 L52 32 L46 58 Z" fill="%230f6d8f"/></svg>`;
      const url = (agent) => `/modules/agent-launch?agentId=${encodeURIComponent(agent.id)}`;
      const cleanText = (value, limit = 180) => {
        const text = String(value || '')
          .replace(/<[^>]*>/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
        return text.length > limit ? `${text.slice(0, limit - 1)}…` : text;
      };
      const agentIntro = (agent, limit) => cleanText(agent.tagline || agent.description || '这个 Agent 还没有填写介绍。', limit);
      const stats = (agent, i) => ({ stars: Number(agent.stars || ((i * 3 + 2) % 12)), runs: Number(agent.runs || ((i + 1) * 6 + (agent.name || '').length)) });
      function card(agent, i) {
        const s = stats(agent, i);
        const a = document.createElement('a');
        a.className = 'card';
        a.href = url(agent);
        a.target = '_top';
        a.innerHTML = `<img alt=""><div><div class="title"><strong></strong><span class="badge"></span></div><div class="desc"></div><div class="meta"><span>☆ ${s.stars}</span><span>⌘ ${s.runs}</span></div></div><span class="meta">☆</span><div class="hover"><div class="hover-inner"></div></div>`;
        a.querySelector('img').src = agent.avatarUrl || avatar(i);
        a.querySelector('strong').textContent = cleanText(agent.name || '未命名', 64);
        a.querySelector('.badge').textContent = cleanText(agent.category || 'Agent', 24);
        a.querySelector('.desc').textContent = agentIntro(agent, 120);
        const hover = a.querySelector('.hover-inner');
        if (agent.demoVideoUrl) {
          hover.innerHTML = `<video src="${agent.demoVideoUrl}" muted loop playsinline></video><p></p>`;
          hover.querySelector('p').textContent = agentIntro(agent, 160);
          const v = hover.querySelector('video');
          a.addEventListener('mouseenter', () => v.play().catch(() => {}));
          a.addEventListener('mouseleave', () => { v.pause(); v.currentTime = 0; });
        } else {
          hover.textContent = agentIntro(agent, 180) || '点击进入对话，试用这个 Agent。';
        }
        return a;
      }
      fetch('/api/module-agent-launch/agents').then(r => r.json()).then(data => {
        const agents = Array.isArray(data) ? data.filter(a => a && a.status === 'published').slice(0, 120) : [];
        if (!agents.length) {
          featured.innerHTML = '<div class="empty">还没有已发布的 Agent。</div>';
          mine.innerHTML = '<div class="empty">还没有我的 Agent。</div>';
          allAgents.innerHTML = '<div class="empty">还没有其他 Agent。</div>';
          return;
        }
        const myAgents = agents.filter(agent => String(agent.id || '').startsWith('local-agent-square-'));
        featured.replaceChildren(...agents.slice(0, 4).map(card));
        mine.replaceChildren(...(myAgents.length ? myAgents : agents).map(card));
        allAgents.replaceChildren(...agents.map(card));
      }).catch(() => {
        featured.innerHTML = '<div class="empty">Agent 广场加载失败。</div>';
        mine.innerHTML = '';
        allAgents.innerHTML = '';
      });
    </script>
  </body>
</html>
