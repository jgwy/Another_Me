name: another-me

# Four isolated services (R24). The backend straddles two networks:
#   - appnet:      db + backend + frontend (+ outbound internet for LLM calls)
#   - sandbox_net: backend + sandbox-runner ONLY, marked `internal: true`
# The sandbox-runner is attached to sandbox_net only, so it has NO internet,
# NO database, and NO secrets — satisfying R20 / SC4.

services:
  db:
    image: postgres:18.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-another_me}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-another_me}
      POSTGRES_DB: ${POSTGRES_DB:-another_me}
    ports:
      # Bind to loopback only — never expose Postgres on the public interface.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Postgres 18+ stores data in a major-version subdir; mount the parent dir
      # (NOT /var/lib/postgresql/data) per the official image guidance.
      - db_data:/var/lib/postgresql
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-another_me} -d ${POSTGRES_DB:-another_me}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://another_me:another_me@db:5432/another_me}
      # Auth
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      # LLM
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-5-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      # Per-chunk streaming delay for the deterministic mock provider. A small
      # value (seconds) makes the SSE spectate view stream turn-by-turn instead
      # of resolving instantly; ignored by the real OpenAI/Anthropic providers.
      MOCK_STREAM_DELAY: ${MOCK_STREAM_DELAY:-0.04}
      # Orchestration
      MAX_ROUNDS: ${MAX_ROUNDS:-8}
      MAX_CONCURRENT_CONVERSATIONS: ${MAX_CONCURRENT_CONVERSATIONS:-4}
      # Trips: real wall-clock duration (seconds) a journey is spread over.
      # TRIP_DURATION_SECONDS is the canonical knob (demo fast / prod slow); the
      # backend reads it via settings.trip_duration_seconds. TRIP_DURATION is the
      # deprecated v1 alias, kept for back-compat.
      TRIP_DURATION_SECONDS: ${TRIP_DURATION_SECONDS:-45}
      TRIP_DURATION: ${TRIP_DURATION:-60}
      # Sandbox
      SANDBOX_URL: ${SANDBOX_URL:-http://sandbox-runner:8001}
      SANDBOX_TIMEOUT_SECONDS: ${SANDBOX_TIMEOUT_SECONDS:-10}
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      # Reached by the browser through the `gateway` (/api), not directly.
      # Bind to loopback only for host-side debugging; not public.
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    networks:
      - appnet
      - sandbox_net
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Empty => the built app calls the API same-origin (/api), so it works
      # behind the `gateway` reverse proxy and EdgeOne with no CORS / no
      # mixed-content. For standalone local dev (no gateway) set this to the
      # backend host URL, e.g. http://localhost:8000.
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    # No public port: the browser reaches the frontend through `gateway` (/).
    networks:
      - appnet
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"fetch('http://localhost:4173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # App entrypoint. Consolidates frontend (/) + backend (/api, incl. SSE) onto
  # one HTTP port published on the host. This site gets its OWN dedicated port
  # (GATEWAY_PORT) so it coexists with any other services/sites on the machine —
  # each site is its own EdgeOne origin with its own origin-pull port. Point
  # EdgeOne's origin port for this domain at GATEWAY_PORT (HTTP origin-pull; TLS
  # is terminated at the EdgeOne edge, so the origin stays HTTP-only).
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${GATEWAY_BIND:-0.0.0.0}:${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./deploy/server/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  sandbox-runner:
    build:
      context: ./sandbox-runner
    restart: unless-stopped
    environment:
      SANDBOX_TIMEOUT_SECONDS: ${SANDBOX_TIMEOUT_SECONDS:-10}
      # Read-only root FS (below) means temp files must live on the tmpfs mount.
      TMPDIR: /tmp
    # No ports published, no DB, no secrets. Internal-only network => no internet.
    networks:
      - sandbox_net
    # --- Hardened isolation (R20 / SC4) -------------------------------------
    # Per-run resource caps so untrusted code can't exhaust the host, a read-only
    # root filesystem with a small writable tmpfs scratch, all Linux capabilities
    # dropped, and no privilege escalation. Combined with the internal-only
    # network and the non-root user baked into the image.
    mem_limit: ${SANDBOX_MEM_LIMIT:-256m}
    memswap_limit: ${SANDBOX_MEM_LIMIT:-256m}
    cpus: ${SANDBOX_CPUS:-0.5}
    pids_limit: ${SANDBOX_PIDS_LIMIT:-128}
    read_only: true
    tmpfs:
      - /tmp:rw,size=64m,nosuid,nodev,noexec
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status==200 else 1)\""
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

networks:
  appnet:
    driver: bridge
  sandbox_net:
    driver: bridge
    internal: true

volumes:
  db_data:
